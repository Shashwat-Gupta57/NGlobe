name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        
    - name: Build Frontend
      run: |
        cd frontend
        npm ci
        npm run build
        cd ..
        mkdir -p src/nglobe/ui
        cp -r frontend/dist/* src/nglobe/ui/

    - name: Check formatting & linting
      run: |
        pip install ruff
        ruff check src/nglobe
        ruff format --check src/nglobe
